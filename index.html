<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividad 2. Librería utileria.js</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <h1>Librería utileria.js</h1>
    <div class="seccion">
    <h2>Formulario</h2>
    <form id="formulario">
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre">
        <p id="mensajeNombre"></p>
        <label for="telefono">Teléfono</label>
        <input type="number" id="telefono">
        <p id="mensajeTelefono"></p>
        <label for="fecha">Fecha de Nacimiento</label>
        <input type="date" id="fecha">
        <p id="mensajeEdad"></p>
        <label for="cp">Código Postal</label>
        <input type="text" id="cp">
        <p id="mensajeCP"></p>
        <label for="texto">Texto</label>
        <input type="text" id="texto">
        <p id="mensajeTexto"></p>
        <button type="button" onclick="validarFormulario()">Validar</button>
        <hr>
        <h2>Modal</h2>
        <button type="button" onclick="abrirModal()">Mostrar Edad</button>
        <div id="modal" class="modal">
            <div class="contenidoModal">
                <h3>Edad calculada</h3>
                <p id="edadCalculada"></p>
                <button type="button" onclick="cerrarModal()">Cerrar</button>
            </div>
        </div>
    <hr>
        <a href="login.html">Ir al login</a>
    </form>
    </div>
    <script src="js/utileria.js"></script>
    <script src="js/form.js"></script>
</body>
</html>
